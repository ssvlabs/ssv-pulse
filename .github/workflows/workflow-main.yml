name: Main branch workflow

on:
  push:
    branches:
      - main

# Serialize release runs so two quick merges cannot race the tag bump.
concurrency:
  group: main-release
  cancel-in-progress: false

env:
  IMAGE_ARCHITECTURES: linux/amd64,linux/arm64
  IMAGE_REGISTRY: ghcr.io
  DOCKERFILE_PATH: build/Dockerfile
  IMAGE_DESCRIPTION: |
    This Docker image is a CLI tool for evaluating the health and severity of various SSV client related metrics over time.

jobs:
  go-checks:
    uses: ./.github/workflows/go.yml
    permissions:
      contents: read

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: go-checks
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          DEFAULT_BRANCH: main

      - name: Create a GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generateReleaseNotes: true

  docker-build-push:
    uses: ./.github/workflows/docker.yml
    permissions:
      id-token: write
      packages: write
      contents: read
    needs: publish-release
    with:
      with-push: true
      image-tag: ${{ needs.publish-release.outputs.new_tag }}